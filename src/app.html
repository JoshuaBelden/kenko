<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..500;1,9..40,300..500&family=Shippori+Mincho:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#f5f2ee" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1917" media="(prefers-color-scheme: dark)" />
    <title>Kenkō</title>
    <script>
      ;(function () {
        var t = localStorage.getItem("kenko-theme")
        if (t) document.documentElement.setAttribute("data-theme", t)
        else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
          document.documentElement.setAttribute("data-theme", "dark")
      })()
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
